---
name: Auto-update add-on versions

on:
  schedule:
    # Every day at 04:17 UTC
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: Check upstream LinuxServer.io versions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/scripts/requirements.txt

      - name: Run version updater
        id: updater
        run: |
          python .github/scripts/update_versions.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            SUMMARY="$(cat .github/.update_summary 2>/dev/null || echo 'Automatic version bump')"
            git add -A
            printf 'chore: bump add-on versions\n\n%s\n' "$SUMMARY" > .git/COMMIT_MSG
            git commit -F .git/COMMIT_MSG
            git push
          else
            echo "No changes to commit."
          fi
