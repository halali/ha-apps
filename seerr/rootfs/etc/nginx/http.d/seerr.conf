server {
    listen 5055 default_server;

    proxy_buffering off;
    gzip_static off;
    client_max_body_size 0;

    # Based on https://github.com/seerr-team/seerr/blob/develop/docs/extending-seerr/reverse-proxy.mdx
    location ^~ / {
        set $app '__INGRESS_ENTRY__';

        rewrite ^__INGRESS_ENTRY__/?(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:5056;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_hide_header X-Powered-By;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Must be empty to disable gzip — sub_filter cannot process compressed responses
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 90;

        absolute_redirect off;
        proxy_redirect ^ $app;
        proxy_redirect /setup $app/setup;
        proxy_redirect /login $app/login;

        # ── HTML-only substitutions ───────────────────────────────────────────
        # Apply sub_filter only to HTML responses to avoid breaking minified JS
        # (path patterns like /images/ appear inside regex literals in JS bundles).
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter 'href="/"'              'href="$app"';
        sub_filter 'href="/login"'         'href="$app/login"';
        sub_filter '\/_next'               '__INGRESS_ENTRY_ESCAPED__\/_next';
        sub_filter '/_next'                '$app/_next';
        sub_filter '/api/v1'               '$app/api/v1';
        sub_filter '/login/plex/loading'   '$app/login/plex/loading';
        sub_filter '/images/'              '$app/images/';
        sub_filter '/imageproxy/'          '$app/imageproxy/';
        sub_filter '/avatarproxy/'         '$app/avatarproxy/';
        sub_filter '/android-'             '$app/android-';
        sub_filter '/apple-'               '$app/apple-';
        sub_filter '/favicon'              '$app/favicon';
        sub_filter '/logo_'                '$app/logo_';
        sub_filter '/site.webmanifest'     '$app/site.webmanifest';

        # ── crypto.randomUUID polyfill ────────────────────────────────────────
        # crypto.randomUUID requires a secure context (HTTPS). On plain HTTP
        # (homeassistant.local:8123) it is undefined, breaking Plex OAuth login.
        # Inject a Math.random-based fallback into every HTML page.
        sub_filter '<head>'
            '<head><script>if(!crypto.randomUUID){crypto.randomUUID=function(){return"10000000-1000-4000-8000-100000000000".replace(/[018]/g,function(c){return(+c^(Math.random()*16>>+c/4)).toString(16)})}}</script>';
    }
}
