server {
    listen 5055 default_server;

    # proxy_buffering ON (default) required for sub_filter to work.
    # nginx automatically disables buffering for WebSocket upgrades.
    gzip_static off;
    client_max_body_size 0;

    location ^~ / {
        set $app '__INGRESS_ENTRY__';

        rewrite ^__INGRESS_ENTRY__/?(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:5056;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_hide_header X-Powered-By;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Disable backend gzip so sub_filter can scan responses
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 90;

        absolute_redirect off;
        proxy_redirect ^ $app;
        proxy_redirect /setup $app/setup;
        proxy_redirect /login $app/login;

        # ── Attribute-scoped HTML substitutions ──────────────────────────────
        # Only replace inside HTML attribute values (src=, href=).
        # This avoids corrupting the __NEXT_DATA__ JSON embedded in the HTML,
        # which uses the same path strings and is parsed by React at hydration.
        sub_filter_once off;
        sub_filter_types text/html;

        # Next.js static assets
        sub_filter 'src="/_next'            'src="$app/_next';
        sub_filter 'href="/_next'           'href="$app/_next';

        # Navigation links
        sub_filter 'href="/"'               'href="$app"';
        sub_filter 'href="/login"'          'href="$app/login"';
        sub_filter 'href="/setup"'          'href="$app/setup"';

        # PWA / favicon / logo — appear as both href= and src= depending on tag
        sub_filter 'href="/android-'        'href="$app/android-';
        sub_filter 'src="/android-'         'src="$app/android-';
        sub_filter 'href="/apple-'          'href="$app/apple-';
        sub_filter 'src="/apple-'           'src="$app/apple-';
        sub_filter 'href="/favicon'         'href="$app/favicon';
        sub_filter 'src="/favicon'          'src="$app/favicon';
        sub_filter 'href="/logo_'           'href="$app/logo_';
        sub_filter 'src="/logo_'            'src="$app/logo_';
        sub_filter 'href="/site.webmanifest' 'href="$app/site.webmanifest';
        sub_filter 'src="/site.webmanifest'  'src="$app/site.webmanifest';

        # Image src attributes
        sub_filter 'src="/images/'          'src="$app/images/';
        sub_filter 'src="/imageproxy/'      'src="$app/imageproxy/';
        sub_filter 'src="/avatarproxy/'     'src="$app/avatarproxy/';

        # ── Injected JS patches ───────────────────────────────────────────────
        # 1. Patch window.open: plex.ts opens window.open('/login/plex/loading')
        #    without the ingress prefix — must prepend it so HA routes correctly.
        # 2. Polyfill crypto.randomUUID for non-secure (HTTP) contexts.
        # 3. Patch fetch/XHR to prepend ingress prefix to /api/v1 calls —
        #    replaces the dangerous HTML sub_filter approach.
        sub_filter '<head>' '<head><script>(function(){
var p="__INGRESS_ENTRY__";
var _o=window.open.bind(window);
window.open=function(u,t,f){
  if(typeof u==="string"&&u[0]==="/"&&u.slice(0,p.length)!==p)u=p+u;
  return _o(u,t,f)
};
if(!crypto.randomUUID)crypto.randomUUID=function(){
  return"10000000-1000-4000-8000-100000000000".replace(/[018]/g,function(c){
    return(+c^(Math.random()*16>>+c/4)).toString(16)
  })
};
var _f=window.fetch;
window.fetch=function(r,o){
  if(typeof r==="string"&&r[0]==="/"&&r.slice(0,p.length)!==p)r=p+r;
  return _f.call(this,r,o)
};
var _x=window.XMLHttpRequest;
function PatchedXHR(){var x=new _x();var _open=x.open.bind(x);x.open=function(m,u){if(typeof u==="string"&&u[0]==="/"&&u.slice(0,p.length)!==p)u=p+u;return _open(m,u)};return x}
PatchedXHR.prototype=_x.prototype;
window.XMLHttpRequest=PatchedXHR;
})();</script>';
    }
}
