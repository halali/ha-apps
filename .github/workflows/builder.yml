---
name: Builder

on:
  push:
    branches:
      - main
    paths:
      - "*/config.yaml"
      - "*/build.yaml"
      - "*/Dockerfile"
      - "*/rootfs/**"
      - ".github/workflows/builder.yml"
  workflow_dispatch:
    inputs:
      addon:
        description: "Add-on to build (leave empty for all changed)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  init:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      changed_addons: ${{ steps.set-matrix.outputs.changed }}
      any_changed: ${{ steps.set-matrix.outputs.any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Compute changed add-ons
        id: set-matrix
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_ADDON: ${{ github.event.inputs.addon }}
        run: |
          set -euo pipefail
          ADDONS='["sonarr","radarr","bazarr","seerr","prowlarr"]'

          if [[ -n "$MANUAL_ADDON" ]]; then
            echo "changed=[\"$MANUAL_ADDON\"]" >> "$GITHUB_OUTPUT"
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "changed=$ADDONS" >> "$GITHUB_OUTPUT"
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Initial commit: before SHA is all zeros — build everything
          if [[ "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "changed=$ADDONS" >> "$GITHUB_OUTPUT"
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA" \
            | awk -F/ '{print $1}' | sort -u)
          FILTERED=$(python3 -c "
          import json, sys
          addons = json.loads('$ADDONS')
          changed = set(sys.stdin.read().split())
          out = [a for a in addons if a in changed]
          print(json.dumps(out))
          " <<< "$CHANGED")
          echo "changed=$FILTERED" >> "$GITHUB_OUTPUT"
          if [[ "$FILTERED" == "[]" ]]; then
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.addon }} (amd64)
    needs: init
    if: needs.init.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJson(needs.init.outputs.changed_addons) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get add-on metadata
        id: meta
        run: |
          ADDON="${{ matrix.addon }}"
          VERSION=$(grep -E '^version:' "${ADDON}/config.yaml" | head -1 | sed -E 's/version:[[:space:]]*"?([^"]+)"?/\1/')
          BUILD_FROM=$(python3 -c "
          import sys
          data = open('${ADDON}/build.yaml').read()
          for line in data.splitlines():
              line = line.strip()
              if line.startswith('amd64:'):
                  print(line.split(':', 1)[1].strip())
                  break
          ")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_from=${BUILD_FROM}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: amd64
          image: ghcr.io/${{ github.repository_owner }}/ha-apps-amd64-${{ matrix.addon }}
          image-tags: |
            ${{ steps.meta.outputs.version }}
            latest
          version: ${{ steps.meta.outputs.version }}
          context: ${{ matrix.addon }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          push: "true"
          cosign: "false"
          build-args: |
            BUILD_FROM=${{ steps.meta.outputs.build_from }}
            BUILD_ARCH=amd64
            BUILD_DATE=${{ steps.meta.outputs.date }}
            BUILD_REF=${{ github.sha }}
            BUILD_VERSION=${{ steps.meta.outputs.version }}
